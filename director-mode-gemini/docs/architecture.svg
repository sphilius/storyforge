<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#d4a017" font-size="18" font-weight="700">DIRECTOR MODE — ARCHITECTURE</text>

  <!-- Frontend Box -->
  <rect x="40" y="70" width="200" height="160" rx="8" fill="#242424" stroke="#d4a017" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" fill="#d4a017" font-size="13" font-weight="600">FRONTEND</text>
  <text x="140" y="120" text-anchor="middle" fill="#e8e8e8" font-size="11">React + Vite</text>
  <text x="60" y="145" fill="#888" font-size="10">DirectorCanvas</text>
  <text x="60" y="162" fill="#888" font-size="10">VoiceControls</text>
  <text x="60" y="179" fill="#888" font-size="10">StoryTimeline</text>
  <text x="60" y="196" fill="#888" font-size="10">StatusBar</text>
  <text x="60" y="218" fill="#3498db" font-size="10">useDirectorSession (WS)</text>

  <!-- Arrow FE -> BE -->
  <line x1="240" y1="150" x2="310" y2="150" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="140" text-anchor="middle" fill="#888" font-size="9">WebSocket</text>
  <text x="275" y="165" text-anchor="middle" fill="#888" font-size="9">REST API</text>

  <!-- Backend Box -->
  <rect x="310" y="70" width="200" height="160" rx="8" fill="#242424" stroke="#d4a017" stroke-width="1.5"/>
  <text x="410" y="95" text-anchor="middle" fill="#d4a017" font-size="13" font-weight="600">BACKEND</text>
  <text x="410" y="120" text-anchor="middle" fill="#e8e8e8" font-size="11">FastAPI + Uvicorn</text>
  <text x="330" y="145" fill="#888" font-size="10">main.py (routes)</text>
  <text x="330" y="162" fill="#888" font-size="10">DirectorAgent</text>
  <text x="330" y="179" fill="#888" font-size="10">StoryState</text>
  <text x="330" y="196" fill="#888" font-size="10">Session Manager</text>
  <text x="330" y="218" fill="#3498db" font-size="10">Streaming + Function Calls</text>

  <!-- Arrow BE -> Gemini -->
  <line x1="510" y1="150" x2="580" y2="150" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="140" text-anchor="middle" fill="#888" font-size="9">google-genai</text>

  <!-- Gemini Box -->
  <rect x="580" y="90" width="180" height="120" rx="8" fill="#242424" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" fill="#9b59b6" font-size="13" font-weight="600">GEMINI API</text>
  <text x="670" y="142" text-anchor="middle" fill="#e8e8e8" font-size="11">gemini-2.5-flash</text>
  <text x="600" y="168" fill="#888" font-size="10">Narration generation</text>
  <text x="600" y="185" fill="#888" font-size="10">Function calling</text>
  <text x="600" y="202" fill="#888" font-size="10">Scene/character tools</text>

  <!-- Data flow section -->
  <rect x="40" y="270" width="720" height="200" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="400" y="298" text-anchor="middle" fill="#d4a017" font-size="13" font-weight="600">DATA FLOW</text>

  <!-- Flow steps -->
  <rect x="60" y="320" width="120" height="50" rx="6" fill="#242424" stroke="#555"/>
  <text x="120" y="345" text-anchor="middle" fill="#e8e8e8" font-size="10">User speaks or</text>
  <text x="120" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10">types directive</text>

  <line x1="180" y1="345" x2="220" y2="345" stroke="#d4a017" stroke-width="1"/>

  <rect x="220" y="320" width="120" height="50" rx="6" fill="#242424" stroke="#555"/>
  <text x="280" y="345" text-anchor="middle" fill="#e8e8e8" font-size="10">WebSocket sends</text>
  <text x="280" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10">to DirectorAgent</text>

  <line x1="340" y1="345" x2="380" y2="345" stroke="#d4a017" stroke-width="1"/>

  <rect x="380" y="320" width="120" height="50" rx="6" fill="#242424" stroke="#555"/>
  <text x="440" y="345" text-anchor="middle" fill="#e8e8e8" font-size="10">Gemini generates</text>
  <text x="440" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10">narration + tools</text>

  <line x1="500" y1="345" x2="540" y2="345" stroke="#d4a017" stroke-width="1"/>

  <rect x="540" y="320" width="120" height="50" rx="6" fill="#242424" stroke="#555"/>
  <text x="600" y="345" text-anchor="middle" fill="#e8e8e8" font-size="10">StoryState updates</text>
  <text x="600" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10">scenes/characters</text>

  <line x1="600" y1="370" x2="600" y2="400" stroke="#d4a017" stroke-width="1"/>

  <rect x="220" y="400" width="440" height="45" rx="6" fill="#242424" stroke="#d4a017"/>
  <text x="440" y="425" text-anchor="middle" fill="#d4a017" font-size="11">Tokens stream back to Canvas — Timeline updates in real time</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4a017"/>
    </marker>
  </defs>
</svg>
